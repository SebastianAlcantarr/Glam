<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda de Citas de Uñas</title>
    <style>
        :root {
    --beige-light: #fff7ed;
    --beige-medium: #e8d9c1;
    --beige-dark: #bfa980;
    --beige-accent: #d9b99b;
    --brown-text: #7d5c36;
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
}

body {
    background: var(--beige-light);
    color: var(--brown-text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

header {
    background: var(--beige-medium);
    padding: 2rem 0 1rem 0;
    text-align: center;
    border-bottom: 2px solid var(--beige-accent);
}

header h1 {
    font-size: 2.5rem;
    color: var(--brown-text);
}

main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem;
    gap: 2rem;
}

.form-section, .list-section {
    background: var(--beige-medium);
    padding: 2rem;
    border-radius: 15px;
    box-shadow: 0 2px 8px 0 rgba(191, 169, 128, 0.1);
    width: 100%;
    max-width: 400px;
}

.form-section h2, .list-section h2 {
    margin-bottom: 1rem;
    color: var(--brown-text);
}

form {
    display: flex;
    flex-direction: column;
    gap: 1rem;
}

label {
    font-weight: bold;
}

input[type="text"], input[type="time"], select {
    padding: 0.5rem;
    border: 1px solid var(--beige-dark);
    border-radius: 6px;
    background: var(--beige-light);
    color: var(--brown-text);
}

button[type="submit"] {
    margin-top: 1rem;
    padding: 0.7rem;
    background: var(--beige-accent);
    color: var(--brown-text);
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 1rem;
    font-weight: bold;
    transition: background 0.2s;
}

button[type="submit"]:hover {
    background: var(--beige-dark);
}

.list-section {
    max-width: 600px;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: var(--beige-light);
}

th, td {
    padding: 0.7rem;
    text-align: left;
    border-bottom: 1px solid var(--beige-accent);
}

th {
    background: var(--beige-dark);
    color: #fff;
}

tr:last-child td {
    border-bottom: none;
}

footer {
    background: var(--beige-medium);
    text-align: center;
    padding: 1rem 0;
    font-size: 1rem;
    color: var(--brown-text);
    border-top: 2px solid var(--beige-accent);
}

    </style>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/airbnb.css ">


</head>
<body>
    <header>
        <h1>Agenda de Citas de Uñas</h1>
    </header>
    <main>
        <section class="form-section">
            <h2>Agregar Cita</h2>
            <form id="appointmentForm">
                <label for="nombre">Nombre:</label>
                <input type="text" id="nombre" name="nombre" required>

                <label for="estado">Hora Inicial de su cita:</label>
                <input id="timepicker" type="text" placeholder="Selecciona hora">

                <label for="estado">Estado:</label>
                <select id="estado" name="estado" required>
                    <option value="disponible">Disponible</option>
                    <option value="no disponible">No Disponible</option>
                </select>

                <button type="submit">Agregar Cita</button>
            </form>
        </section>
        <section class="list-section">
            <h2>Lista de Citas</h2>
            <table id="appointmentsTable">
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Hora de Inicio</th>
                        <th>Hora Final</th>
                        <th>Estado</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Las citas se agregarán aquí dinámicamente -->
                </tbody>
            </table>
        </section>
    </main>
    <footer>
        <p>© 2025 Agenda de Uñas</p>
    </footer>
    <script>
        // script.js
const appointmentForm = document.getElementById('appointmentForm');
const appointmentsTableBody = document.querySelector('#appointmentsTable tbody');
const API_URL = 'http://127.0.0.1:8000/api/citas';

// Cargar citas al iniciar
document.addEventListener('DOMContentLoaded', cargarCitas);


// Manejar el envío del formulario
appointmentForm.addEventListener('submit', async function(e) {
    e.preventDefault();

    const nombre = document.getElementById('nombre').value.trim();
    const hora_inicio = document.getElementById('timepicker').value; // Cambiado aquí
    const estado = document.getElementById('estado').value;

    if (!nombre || !hora_inicio) {
        alert('Por favor, complete todos los campos.');
        return;
    }
    hora_i=hora_inicio.replace('/AM|PM/i'," ")

    function sumarUnaHora(horaStr) {
  // Extraer AM o PM
  let ampm = horaStr.match(/AM|PM/i);

  ampm = ampm[0].toUpperCase();

  // Quitar AM/PM y espacios
  let horaSinAmPm = horaStr.replace(/(AM|PM)/i, '').trim();

  // Separar horas y minutos
  let [horas, minutos] = horaSinAmPm.split(':').map(Number);

  if (isNaN(horas) || isNaN(minutos)) throw new Error("Formato inválido de hora");

  // Convertir a 24 horas para facilitar la suma
  if (ampm === 'PM' && horas < 12) {
    horas += 12;
  } else if (ampm === 'AM' && horas === 12) {
    horas = 0;
  }

  // Sumar 1 hora
  horas = (horas + 1) % 24;

  // Convertir de nuevo a formato 12 horas
  let nuevaAmPm = horas >= 12 ? 'PM' : 'AM';
  let horas12 = horas % 12;
  if (horas12 === 0) horas12 = 12;

  // Formatear con dos dígitos los minutos
  let minutosStr = minutos.toString().padStart(2, '0');

  // Construir el string final
  return `${horas12}:${minutosStr} ${nuevaAmPm}`;
}

    let hora_final = sumarUnaHora(hora_i)

    try {
        const response = await fetch(API_URL, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                nombre,
                hora_inicio,
                hora_final,
                estado
            }),
        });

        const data = await response.json();

        if (!response.ok) {
            throw new Error(data.error || 'Error al agregar la cita');
        }

        cargarCitas();
        appointmentForm.reset();
    } catch (error) {
        console.error('Error:', error);
        alert(error.message || 'Error al procesar la solicitud');
    }
});



async function cargarCitas() {
    try {
        const response = await fetch(API_URL);
        if (!response.ok) {
            throw new Error('Error al cargar las citas');
        }
        const citas = await response.json();
        renderCitas(citas);
    } catch (error) {
        console.error('Error:', error);
        alert('Error al cargar las citas');
    }
}

// Función para mostrar las citas en la tabla
function renderCitas(citas) {
    appointmentsTableBody.innerHTML = '';

    if (citas.length === 0) {
        const tr = document.createElement('tr');
        tr.innerHTML = '<td colspan="4">No hay citas programadas</td>';
        appointmentsTableBody.appendChild(tr);
        return;
    }

    citas.forEach(cita => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td>${cita.nombre}</td>
            <td>${cita.hora_inicio}</td>
            <td>${cita.hora_final}</td>
            <td style="color: ${cita.estado === 'disponible' ? 'green' : 'red'};">
                ${cita.estado.charAt(0).toUpperCase() + cita.estado.slice(1)}
            </td>
        `;
        appointmentsTableBody.appendChild(tr);
    });
}
    </script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script>
  flatpickr("#timepicker", {
      minDate:"today",
    enableTime: true,
    noCalendar: false,
    dateFormat: "h:i K",  // h = 12h, K = AM/PM
    time_24hr: false,
    minTime: "10:00",
    maxTime: "18:00",
    minuteIncrement: 30
  });
</script>

</body>
</html>
